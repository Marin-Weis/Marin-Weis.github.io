<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <!-- Restore the clean URL after the GitHub Pages 404.html SPA redirect. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />

    <title>Portfolio Web Marin Weis</title>
    <meta
      name="description"
      content="Portfolio of Marin Weis, computer science student (BUT Informatique) in Vannes, France. Web & mobile development projects in Java, Kotlin, React, SQL and PHP."
    />
    <meta name="author" content="Marin Weis" />
